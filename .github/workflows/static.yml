name: Build and Deploy Ignite to Pages

on:
  push:
    branches: ["main", "feature/landingPage"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: fwal/setup-swift@v1
        with:
          swift-version: "6.0"

      - name: Cache Swift Package Manager
        uses: actions/cache@v3
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build Ignite site
        run: cd LandingPage && swift run

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './LandingPage/Build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

